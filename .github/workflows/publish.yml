# Place this file at .github/workflows/release.yml in the PUBLIC repo (Record10/record-bill)
# Builds are free & unlimited on public repos.
#
# REQUIRED SECRETS (set in Organization Settings → Secrets and variables → Actions):
#   - PRIVATE_REPO_PAT                   : Fine-grained PAT with Contents:Read on Pritraj/Record-Bill
#   - TAURI_SIGNING_PRIVATE_KEY          : Tauri update signing key (~/.tauri/myshapkey.key)
#   - ANDROID_KEYSTORE_BASE64            : Base64-encoded Android keystore
#   - KEY_ALIAS                          : Key alias
#   - GEN_PASSWORD                       : Shared password (keystore, key, signing key)
#
name: Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from (private repo)"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - main

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: desktop
          - platform: ubuntu-latest
            target: android
          - platform: windows-latest
            target: desktop
    runs-on: ${{ matrix.platform }}

    steps:
      # ─── Clone source from private repo ───
      - name: Clone private repository
        shell: bash
        run: |
          git clone --depth 1 --branch ${{ inputs.branch }} \
            https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/Pritraj/record-bill.git .

      # ─── Common setup ───
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || '' }}

      # ─── Android-specific setup ───
      - name: Install Java (Android only)
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Android SDK
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: matrix.target == 'android'
        shell: bash
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      # ─── Build frontend ───
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # ─── Read version & config from tauri.conf.json ───
      - name: Get Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep '"version":' tauri/tauri.conf.json | head -n 1 | awk -F: '{ print $2 }' | sed 's/[", ]//g')
          echo "Building version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Determine Release Config
        id: release_config
        shell: bash
        run: |
          if [[ "${{ inputs.branch }}" == "qa" ]]; then
            echo "type=qa" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "tag=v${{ steps.get_version.outputs.version }}-qa.${{ github.run_number }}" >> $GITHUB_OUTPUT

            # Merge QA config into tauri.conf.json
            if [[ "$RUNNER_OS" == "Windows" ]]; then
              choco install jq -y
            fi
            jq -s '.[0] * .[1]' tauri/tauri.conf.json tauri/tauri.conf.qa.json > tauri/tauri.conf.merged.json
            mv tauri/tauri.conf.merged.json tauri/tauri.conf.json
          else
            echo "type=prod" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "tag=v${{ steps.get_version.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      # ─── Windows workaround (desktop only) ───
      - name: Workaround for deep-link on Windows (Desktop)
        if: runner.os == 'Windows' && matrix.target == 'desktop'
        shell: bash
        run: |
          # Rename gen/android so tauri-build doesn't try to write tauri.settings.gradle
          # (Windows env vars are case-insensitive, causing os error 3)
          mv tauri/gen/android tauri/gen/_android_disabled
          # Remove deep-link config to prevent plugin panic on Windows
          jq 'del(.plugins."deep-link")' tauri/tauri.conf.json > tauri/tauri.conf.temp.json
          mv tauri/tauri.conf.temp.json tauri/tauri.conf.json

      # ─── Windows workaround (android only) ───
      - name: Remove deep-link config (Android on Windows)
        if: runner.os == 'Windows' && matrix.target == 'android'
        shell: bash
        run: |
          # Remove deep-link config to prevent plugin panic on Windows
          jq 'del(.plugins."deep-link")' tauri/tauri.conf.json > tauri/tauri.conf.temp.json
          mv tauri/tauri.conf.temp.json tauri/tauri.conf.json

      # ─── Desktop build (macOS or Windows) ───
      - name: Build Tauri Desktop App
        if: matrix.target == 'desktop'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.GEN_PASSWORD }}
        with:
          projectPath: tauri
          tagName: ${{ steps.release_config.outputs.tag }}
          releaseName: "App ${{ steps.release_config.outputs.tag }}"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: ${{ steps.release_config.outputs.prerelease }}

      # ─── Decode Android keystore ───
      - name: Decode Android keystore
        if: matrix.target == 'android'
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/upload-keystore.jks

      # ─── Android build (produces unsigned APK & AAB) ───
      - name: Build Android
        if: matrix.target == 'android'
        shell: bash
        run: |
          cd tauri
          ../frontend/node_modules/.bin/tauri android build --target aarch64
          mkdir -p ../build-artifacts
        env:
          NDK_HOME: ${{ env.NDK_HOME }}

      # ─── Sign APK ───
      - name: Sign APK
        if: matrix.target == 'android'
        shell: bash
        run: |
          UNSIGNED_APK=$(find tauri/gen/android -name "*.apk" -path "*release*" | head -1)
          echo "Found APK: $UNSIGNED_APK"
          BUILD_TOOLS_DIR="${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | sort -V | tail -1)"
          ${BUILD_TOOLS_DIR}/zipalign -v 4 "$UNSIGNED_APK" /tmp/app-aligned.apk
          ${BUILD_TOOLS_DIR}/apksigner sign \
            --ks /tmp/upload-keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.GEN_PASSWORD }}" \
            --key-pass "pass:${{ secrets.GEN_PASSWORD }}" \
            --out build-artifacts/app-release.apk \
            /tmp/app-aligned.apk

      # ─── Sign AAB ───
      - name: Sign AAB
        if: matrix.target == 'android'
        shell: bash
        run: |
          UNSIGNED_AAB=$(find tauri/gen/android -name "*.aab" -path "*release*" | head -1)
          echo "Found AAB: $UNSIGNED_AAB"
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore /tmp/upload-keystore.jks \
            -storepass "${{ secrets.GEN_PASSWORD }}" \
            -keypass "${{ secrets.GEN_PASSWORD }}" \
            "$UNSIGNED_AAB" "${{ secrets.KEY_ALIAS }}"
          cp "$UNSIGNED_AAB" build-artifacts/app-release.aab

      - name: Upload Android builds to GitHub Release
        if: matrix.target == 'android'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_config.outputs.tag }}
          files: |
            build-artifacts/app-release.apk
            build-artifacts/app-release.aab
